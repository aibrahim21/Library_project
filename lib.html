<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Manager Pro</title>
    <link rel="stylesheet" href="libstyle.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>📚 Library Manager Pro</h1>
            <p class="subtitle">Manage your book collection with powerful analytics</p>
        </header>

        <!-- Add Book Section -->
        <section class="add-book-section">
            <h2>Add New Book</h2>
            <form id="addBookForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bookName">Book Name</label>
                        <input type="text" id="bookName" placeholder="e.g., The Great Gatsby" required>
                    </div>
                    <div class="form-group">
                        <label for="bookPrice">Price ($)</label>
                        <input type="number" id="bookPrice" placeholder="e.g., 15.99" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="authorName">Author Name</label>
                        <input type="text" id="authorName" placeholder="e.g., F. Scott Fitzgerald" required>
                    </div>
                    <div class="form-group">
                        <label for="authorEmail">Author Email</label>
                        <input type="email" id="authorEmail" placeholder="e.g., author@example.com" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Book</button>
            </form>
        </section>

        <!-- Analytics Dashboard -->
        <section class="analytics-section">
            <h2>📊 Collection Analytics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Total Books</span>
                    <span class="stat-value" id="totalBooks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Average Price</span>
                    <span class="stat-value" id="averagePrice">$0.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Most Expensive</span>
                    <span class="stat-value" id="mostExpensive">$0.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Value</span>
                    <span class="stat-value" id="totalValue">$0.00</span>
                </div>
            </div>
        </section>

        <!-- Book Table -->
        <section class="table-section">
            <h2>📖 Your Books</h2>
            <div class="table-wrapper">
                <table id="bookTable">
                    <thead>
                        <tr>
                            <th>Book Name</th>
                            <th>Price</th>
                            <th>Author Name</th>
                            <th>Author Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookTableBody">
                        <!-- Books will be dynamically inserted here -->
                    </tbody>
                </table>
            </div>
            <p class="empty-message" id="emptyMessage">No books yet. Add your first book above!</p>
        </section>
    </div>

    <script src="lib.js"></script>
</body>
</html>
